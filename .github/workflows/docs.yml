name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions for the deploy job
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Sphinx build (-W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
          pip install build

      - name: Build wheel for in-browser REPL
        # The Pyodide REPL under docs/repl/ loads the reasitic wheel
        # from docs/repl/wheels/. Build a fresh wheel so the deployed
        # site always reflects the current source.
        run: |
          python -m build --wheel --outdir docs/repl/wheels/

      - name: Build HTML
        working-directory: docs
        run: make strict

      - name: Run doctest builder
        working-directory: docs
        run: make doctest

      - name: Upload HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html
          if-no-files-found: error

      - name: Upload as Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
